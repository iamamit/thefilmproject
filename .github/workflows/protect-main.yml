name: Protect main branch

on:
  pull_request:
    branches: [main]

jobs:
  check-source-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Only develop can be merged into main
        run: |
          if [ "${{ github.head_ref }}" != "develop" ]; then
            echo "❌ PRs to main are only allowed from develop. Got: ${{ github.head_ref }}"
            exit 1
          fi
          echo "✅ Source branch is develop — OK"
