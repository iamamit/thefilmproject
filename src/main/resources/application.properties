spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/thefilmproject}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.main.allow-circular-references=true

google.client-id=${GOOGLE_CLIENT_ID:changeme}
google.client-secret=${GOOGLE_CLIENT_SECRET:changeme}
frontend.url=${FRONTEND_URL:http://localhost:3000}
spring.security.oauth2.client.registration.google.client-id=${google.client-id}
spring.security.oauth2.client.registration.google.client-secret=${google.client-secret}
spring.security.oauth2.client.registration.google.scope=email,profile

jwt.secret=${JWT_SECRET:changeme}
jwt.expiration=86400000
